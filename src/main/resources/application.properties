server.port=8083

spring.application.name=ms-auth
spring.datasource.url=jdbc:postgresql://localhost:5432/db-ms-auth
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

jwt.secret=${JWT_SECRET:mi-clave-super-segura-pe-causa-12345678901234567890abcdef}
jwt.expiration=3000000

logging.level.pe.inpe.ms_auth=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

